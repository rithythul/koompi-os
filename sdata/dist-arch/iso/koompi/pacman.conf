# KOOMPI OS — pacman.conf used BY mkarchiso to build the live ISO.  *** SKELETON ***
#
# This is the build-time pacman.conf (which repos mkarchiso pulls the live-ISO
# packages from).  Standard Arch repos PLUS the [koompi] repo carrying the
# koompi-* packages from sdata/dist-arch/.
#
# Repos folded for 2023+: there is NO [community] — it merged into [extra].

[options]
HoldPkg     = pacman glibc
Architecture = auto
# Misc options
ParallelDownloads = 5
# Build-host signature policy for the Arch repos (DBs+packages must be signed).
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# --- KOOMPI repo --------------------------------------------------------------
# Listed FIRST so it can override an upstream package of the same name if ever
# needed.  Today it is purely additive (koompi-* names don't shadow Arch), so the
# ordering is not load-bearing — it is just the safe default.
#
# Server= is a PLACEHOLDER.  The signed [koompi] repo (repo-add + GPG, see the ISO
# chain in README.md) must exist and be reachable before mkarchiso can succeed.
#
# SigLevel below is a CLEARLY-FLAGGED BOOTSTRAP STOPGAP:
#   *** SWITCH TO `SigLevel = Required DatabaseOptional` ONCE THE REPO IS SIGNED. ***
# `Optional TrustAll` accepts unsigned packages — acceptable ONLY for local,
# pre-signing bootstrap builds.  Never ship an ISO built with TrustAll.
[koompi]
SigLevel = Optional TrustAll
Server = https://repo.koompi.org/$repo/os/$arch        # PLACEHOLDER — replace with the real signed mirror

# --- Standard Arch repos ------------------------------------------------------
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# [multilib] — uncomment if 32-bit support is ever needed on the live ISO.
#[multilib]
#Include = /etc/pacman.d/mirrorlist
