# KOOMPI OS — pacman.conf used BY mkarchiso to build the live ISO.  *** SKELETON ***
#
# This is the build-time pacman.conf (which repos mkarchiso pulls the live-ISO
# packages from).  Standard Arch repos PLUS the [koompi] repo carrying the
# koompi-* packages from sdata/dist-arch/.
#
# Repos folded for 2023+: there is NO [community] — it merged into [extra].

[options]
HoldPkg     = pacman glibc
Architecture = auto
# Misc options
ParallelDownloads = 5
# Build-host signature policy for the Arch repos (DBs+packages must be signed).
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# --- KOOMPI repo (DISABLED for the v1 live ISO) -------------------------------
# The v1 live ISO installs a 100% stock-Arch set (see packages.x86_64), so it
# needs NO [koompi] repo — and an unreachable placeholder Server= would make
# `pacman -Sy` abort mkarchiso. The signed [koompi] repo is re-enabled once it is
# built + published (repo/build-repo.sh) and the live set actually pulls koompi-*
# packages. To re-enable: uncomment below, point Server= at the real signed
# mirror, and keep SigLevel = Required (never ship TrustAll). Listed FIRST so it
# can override an upstream package of the same name if ever needed.
#[koompi]
#SigLevel = Required DatabaseOptional
#Server = https://repo.koompi.org/$repo/os/$arch

# --- Standard Arch repos ------------------------------------------------------
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# [multilib] — uncomment if 32-bit support is ever needed on the live ISO.
#[multilib]
#Include = /etc/pacman.d/mirrorlist
