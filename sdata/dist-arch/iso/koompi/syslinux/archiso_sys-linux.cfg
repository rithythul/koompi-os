LABEL arch
TEXT HELP
Boot the KOOMPI OS live/install medium on BIOS.
It boots a live session with the KOOMPI installer (or a shell).
ENDTEXT
MENU LABEL KOOMPI OS live/install (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
