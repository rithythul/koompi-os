# PXE hooks (archiso_pxe_*) dropped: buildmodes=('iso') never netboots, and they
# add_binary tools from mkinitcpio-nfs-utils + nbd (not in packages.x86_64), which
# would fail the initramfs build and abort mkarchiso.
HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
